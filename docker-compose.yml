services:
  postgres:
    image: postgres:16-alpine
    container_name: fourltrophy-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fourltrophy-network
      - shared-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fourltrophy-backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SERVER_PORT: ${SERVER_PORT}
    # Port non exposé - accessible uniquement via le réseau Docker
    expose:
      - "${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fourltrophy-network
      - shared-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: fourltrophy-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - fourltrophy-network
      - shared-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  fourltrophy-network:
    driver: bridge
  shared-network:
    external: true
    name: shared-network
