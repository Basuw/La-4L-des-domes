version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fourltroph-db
    environment:
      POSTGRES_DB: fourltroph
      POSTGRES_USER: fourltroph
      POSTGRES_PASSWORD: fourltroph2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fourltroph-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourltroph"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fourltroph-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fourltroph
      DB_USER: fourltroph
      DB_PASSWORD: fourltroph2024
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://frontend
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fourltroph-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fourltroph-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fourltroph-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  fourltroph-network:
    driver: bridge
